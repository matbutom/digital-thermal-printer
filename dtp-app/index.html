<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#EDE0C4" />
  <title>DTP · Digital Thermal Printer</title>

  <!-- Pixel / monospace font for screen UI -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- =============================================
       PAGE WRAPPER — centers the 375px device
       ============================================= -->
  <div class="page-wrapper">

    <!-- =============================================
         DEVICE CONTAINER — stacks all layers
         ============================================= -->
    <div class="device-container" id="device-container">

      <!-- Layer 1: printer body -->
      <img
        class="device-base"
        src="../assets/300ppi/base@300x.png"
        alt="DTP Digital Thermal Printer body"
        draggable="false"
      />

      <!-- ==========================================
           BUTTON HIT ZONES — transparent tappable
           divs, one per button.
           Each contains a visual orange button image
           that animates on press.
           NOTE: positions calibrated to base@300x.png
           recesses. Tweak data-* percentages via CSS
           custom props or DevTools if off.
           ========================================== -->

      <!-- Button: COLOR (top-center recess) -->
      <div
        class="btn-zone"
        id="btn-color"
        data-btn="color"
        role="button"
        aria-label="Color options"
        tabindex="0"
      >
        <img
          class="btn-icon"
          src="../assets/300ppi/boton@300x.png"
          alt=""
          draggable="false"
        />
      </div>

      <!-- Button: PRINT (top-right recess) -->
      <div
        class="btn-zone"
        id="btn-print"
        data-btn="print"
        role="button"
        aria-label="Print"
        tabindex="0"
      >
        <img
          class="btn-icon"
          src="../assets/300ppi/boton@300x.png"
          alt=""
          draggable="false"
        />
      </div>

      <!-- Button: EFFECTS (middle-left recess) -->
      <div
        class="btn-zone"
        id="btn-effects"
        data-btn="effects"
        role="button"
        aria-label="Effects options"
        tabindex="0"
      >
        <img
          class="btn-icon"
          src="../assets/300ppi/boton@300x.png"
          alt=""
          draggable="false"
        />
      </div>

      <!-- Button: SIZE (middle-center recess) -->
      <div
        class="btn-zone"
        id="btn-size"
        data-btn="size"
        role="button"
        aria-label="Size options"
        tabindex="0"
      >
        <img
          class="btn-icon"
          src="../assets/300ppi/boton@300x.png"
          alt=""
          draggable="false"
        />
      </div>

      <!-- Button: ADD (bottom-left recess) -->
      <div
        class="btn-zone"
        id="btn-add"
        data-btn="add"
        role="button"
        aria-label="Add element"
        tabindex="0"
      >
        <img
          class="btn-icon"
          src="../assets/300ppi/boton@300x.png"
          alt=""
          draggable="false"
        />
      </div>

      <!-- Hidden file input — triggered by JS when user picks "Upload Photo" -->
      <input
        type="file"
        id="photo-input"
        accept="image/*"
        multiple
        class="hidden-input"
        aria-hidden="true"
        tabindex="-1"
      />

      <!-- ==========================================
           SCREEN OVERLAY — sits over the black
           screen area in base@300x.png.
           All screen content is rendered inside by JS.
           ========================================== -->
      <div class="screen-overlay" id="screen-overlay" aria-live="polite">

        <!-- SVG grain filter definition (used by thermal effect) -->
        <svg class="grain-svg" aria-hidden="true">
          <defs>
            <filter id="grain-filter" x="0%" y="0%" width="100%" height="100%">
              <feTurbulence
                type="fractalNoise"
                baseFrequency="0.65"
                numOctaves="3"
                stitchTiles="stitch"
              />
              <feColorMatrix type="saturate" values="0" />
              <feBlend in="SourceGraphic" mode="multiply" />
            </filter>
          </defs>
        </svg>

        <!-- Dynamic screen content: JS writes into this node -->
        <div class="screen-content" id="screen-content">
          <!-- default idle state rendered by JS on init -->
        </div>

      </div>
      <!-- /screen-overlay -->

    </div>
    <!-- /device-container -->

  </div>
  <!-- /page-wrapper -->

  <script src="script.js"></script>
</body>
</html>
